        }

            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;

            background-position: center;
            opacity: 0.7;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .hero p {
            font-size: 1.1rem;
            color: #e0e0e0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .hero-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            z-index: 3;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .controls-section {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .genre-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .genre-filters.hidden {
            display: none;
        }

        .toggle-genres-btn {
            padding: 8px 14px;
            background-color: #2a2a2a;
            border: 1px solid #d4af37;
            color: #d4af37;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .toggle-genres-btn:hover {
            background-color: #3a3a3a;
        }

        .genre-btn {
            padding: 8px 14px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .genre-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .genre-btn.active {
            background-color: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ffffff;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
        }

        .search-box input::placeholder {
            color: #a0a0a0;
        }

        .search-box input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .btn {
            padding: 10px 16px;
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #e5c158;
            transform: scale(1.05);
        }

        .btn-secondary {
            background-color: #2a2a2a;
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        .btn-secondary:hover {
            background-color: #3a3a3a;
        }

        .btn-danger {
            background-color: #c41e3a;
            color: #ffffff;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

            background-color: #d42a45;
        }

            color: #a0a0a0;
            margin-top: 10px;

        .movies-list {

        }

            border: 1px solid #2a2a2a;

            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;

            transform: scale(1.05);
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #a0a0a0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

            display: flex;
            justify-content: space-between;

            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a2a;

            .movie-details {

                gap: 5px;
            }

            .controls {

            }

            .search-box {
                width: 100%;
            }
        }

        <div class="hero-content">
            <h1>Filmotheque C. GASNIER</h1>
            <p>Cette liste est à jour</p>
        </div>
        <div class="hero-line"></div>
    </section>

    <!-- Controls Section -->
    <section class="controls-section">
        <div class="container">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Rechercher par titre...">
                </div>
                <button class="btn" onclick="openAddModal()">+ Ajouter un film</button>
                <button class="toggle-genres-btn" onclick="toggleGenreFilters()">📂 Filtrer par genre</button>
                <button class="toggle-genres-btn" id="sortYearBtn" onclick="toggleSortYear()">📅 Trier par année</button>
            </div>
            <div class="genre-filters hidden" id="genreFilters"></div>
            <div class="counter">
                <span id="movieCount">0</span> film(s) dans la collection
            </div>
        </div>
    </section>

    <!-- Movies List -->
    <div class="container">
        <div class="movies-list" id="moviesList"></div>
        <div id="noResults" class="no-results" style="display: none;">
            <p>Aucun film ne correspond à votre recherche</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>La collection de films de C. GASNIER</p>
        <p style="font-size: 0.85rem;">Cliquez sur "Bande-annonce" pour accéder aux vidéos YouTube</p>
    </footer>

    <!-- Modal Add/Edit Film -->
    <div id="filmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ajouter un film</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="filmForm" onsubmit="saveFilm(event)">
                <div class="form-group">
                    <label for="filmTitle">Titre du film</label>
                    <input type="text" id="filmTitle" required>
                </div>
                <div class="form-group">
                    <label for="filmGenre">Genre</label>
                    <input type="text" id="filmGenre" placeholder="ex: Action, Drame, Science Fiction...">
                </div>
                <div class="form-group">
                    <label for="filmYear">Année</label>
                    <input type="number" id="filmYear" min="1900" max="2100">
                </div>
                <div class="form-group">
                    <label for="filmTrailer">Lien bande-annonce (optionnel)</label>
                    <input type="url" id="filmTrailer" placeholder="https://www.youtube.com/...">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="filmPrete" style="width: auto; margin-right: 8px;">
                        <span style="color: #ffffff;">Film prêté</span>
                    </label>
                </div>
                <div class="form-group">
                    <label for="filmEmprunteur">Nom de l'emprunteur (si prêté)</label>
                    <input type="text" id="filmEmprunteur" placeholder="ex: Jean Dupont">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

        if (movies.length === 0) {
            movies = initialMovies;
            saveToLocalStorage();
        }

        // Basculer le tri par annee
        function toggleSortYear() {
            if (sortYearOrder === null) {
                sortYearOrder = 'desc';
            } else if (sortYearOrder === 'desc') {
                sortYearOrder = 'asc';
            } else {
                sortYearOrder = null;
            }
            
            const sortBtn = document.getElementById('sortYearBtn');
            if (sortYearOrder === null) {
                sortBtn.style.backgroundColor = '#2a2a2a';
                sortBtn.style.color = '#d4af37';
                sortBtn.textContent = '📅 Trier par annee';
            } else if (sortYearOrder === 'desc') {
                sortBtn.style.backgroundColor = '#d4af37';
                sortBtn.style.color = '#1a1a1a';
                sortBtn.textContent = '📅 Annee (recents)';
            } else {
                sortBtn.style.backgroundColor = '#d4af37';
                sortBtn.style.color = '#1a1a1a';
                sortBtn.textContent = '📅 Annee (anciens)';
            }
            
            const searchTerm = document.getElementById('searchInput').value;
            applyFilters(searchTerm, currentGenreFilter);
        }

        // Basculer l'affichage des genres
        function toggleGenreFilters() {
            genreFiltersVisible = !genreFiltersVisible;
            const genreFilters = document.getElementById('genreFilters');
            const toggleBtn = document.querySelector('.toggle-genres-btn');
            
            if (genreFiltersVisible) {
                genreFilters.classList.remove('hidden');
                toggleBtn.style.backgroundColor = '#d4af37';
                toggleBtn.style.color = '#1a1a1a';
            } else {
                genreFilters.classList.add('hidden');
                toggleBtn.style.backgroundColor = '#2a2a2a';
                toggleBtn.style.color = '#d4af37';
            }
        }

        // Initialiser les genres
        function initializeGenres() {
            const genres = [...new Set(movies.map(m => m.Genre).filter(Boolean))].sort();
            const genreFilters = document.getElementById('genreFilters');
            genreFilters.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = 'genre-btn active';
            allBtn.textContent = 'Tous les genres';
            allBtn.onclick = () => filterByGenre(null);
            genreFilters.appendChild(allBtn);
            
            genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'genre-btn';
                btn.textContent = genre;
                btn.onclick = () => filterByGenre(genre);
                genreFilters.appendChild(btn);
            });
        }

        // Filtrer par genre
        function filterByGenre(genre) {
            currentGenreFilter = genre;
            const searchTerm = document.getElementById('searchInput').value;
            applyFilters(searchTerm, genre);
            
            // Mettre à jour les boutons
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.remove('active');
                if ((genre === null && btn.textContent === 'Tous les genres') || 
                    (genre && btn.textContent === genre)) {
                    btn.classList.add('active');
                }
            });
        }

        // Appliquer les filtres
        function applyFilters(searchTerm, genre) {
            let filtered = movies;
            
            if (genre) {
                filtered = filtered.filter(m => m.Genre === genre);
            }
            
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    m.Titre.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (sortYearOrder === 'asc') {
                filtered.sort((a, b) => (a.Annee || 0) - (b.Annee || 0));
            } else if (sortYearOrder === 'desc') {
                filtered.sort((a, b) => (b.Annee || 0) - (a.Annee || 0));
            }
            
            displayMovies(filtered);
        }

        // Afficher les films
        function displayMovies(moviesToDisplay = movies) {
            const list = document.getElementById('moviesList');
            const noResults = document.getElementById('noResults');
            
            list.innerHTML = '';
            
            if (moviesToDisplay.length === 0) {
                noResults.style.display = 'block';
                document.getElementById('movieCount').textContent = '0';
                return;
            }
            
            noResults.style.display = 'none';
            document.getElementById('movieCount').textContent = moviesToDisplay.length;
            
            moviesToDisplay.forEach((movie, index) => {
                const row = document.createElement('div');
                row.className = 'movie-row';
                
                const trailerUrl = movie.TrailerLink || `https://www.youtube.com/results?search_query=${encodeURIComponent(movie.Titre + ' bande annonce')}`;
                const preteStatus = movie.Prete ? `<span class="prete-badge">📍 PRÊTÉ${movie.Emprunteur ? ' à ' + movie.Emprunteur : ''}</span>` : '';
                
                row.innerHTML = `
                    <div class="movie-number">${index + 1}</div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.Titre}${preteStatus}</div>
                        <div class="movie-details">
                            <span class="movie-genre">${movie.Genre || 'Non spécifié'}</span>
                            <span class="movie-year">${movie.Annee || 'Année inconnue'}</span>
                        </div>
                    </div>
                    <div class="movie-actions">
                        <a href="${trailerUrl}" target="_blank" class="trailer-link">▶ Bande-annonce</a>
                        <button class="btn btn-secondary" onclick="editFilm(${movies.indexOf(movie)})">Modifier</button>
                        <button class="btn btn-danger" onclick="deleteFilm(${movies.indexOf(movie)})">Supprimer</button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        // Rechercher
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value;
            applyFilters(term, currentGenreFilter);
        });

        // Ouvrir modal pour ajouter
        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = 'Ajouter un film';
            document.getElementById('filmForm').reset();
            document.getElementById('filmPrete').checked = false;
            document.getElementById('filmEmprunteur').value = '';
            document.getElementById('filmModal').style.display = 'block';
        }

        // Ouvrir modal pour modifier
        function editFilm(index) {
            editingIndex = index;
            const movie = movies[index];
            document.getElementById('modalTitle').textContent = 'Modifier le film';
            document.getElementById('filmTitle').value = movie.Titre;
            document.getElementById('filmGenre').value = movie.Genre || '';
            document.getElementById('filmYear').value = movie.Annee || '';
            document.getElementById('filmTrailer').value = movie.TrailerLink || '';
            document.getElementById('filmPrete').checked = movie.Prete || false;
            document.getElementById('filmEmprunteur').value = movie.Emprunteur || '';
            document.getElementById('filmModal').style.display = 'block';
        }

        // Fermer modal
        function closeModal() {
            document.getElementById('filmModal').style.display = 'none';
            editingIndex = -1;
        }

        // Enregistrer film
        function saveFilm(event) {
            event.preventDefault();
            
            const film = {
                Titre: document.getElementById('filmTitle').value,
                Genre: document.getElementById('filmGenre').value,
                Annee: parseInt(document.getElementById('filmYear').value) || new Date().getFullYear(),
                TrailerLink: document.getElementById('filmTrailer').value,
                Prete: document.getElementById('filmPrete').checked,
                Emprunteur: document.getElementById('filmEmprunteur').value || '',
                Lieu: ''
            };
            
            if (editingIndex === -1) {
                movies.push(film);
            } else {
                movies[editingIndex] = film;
            }
            
            saveToLocalStorage();
            initializeGenres();
            displayMovies();
            closeModal();
        }

        // Supprimer film
        function deleteFilm(index) {
              if (confirm('Êtes-vous sûr de vouloir supprimer ce film ?')) {
                movies.splice(index, 1);
                saveToLocalStorage();
                initializeGenres();
                displayMovies();
            }
        }

        // Sauvegarder dans localStorage
        function saveToLocalStorage() {
            localStorage.setItem('moviesCollection', JSON.stringify(movies));
        }

        // Fermer modal en cliquant dehors
        window.onclick = function(event) {
            const modal = document.getElementById('filmModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialiser
        window.addEventListener('DOMContentLoaded', () => {
            initializeGenres();
            displayMovies();
        });
    </script>
